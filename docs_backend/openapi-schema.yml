components:
  schemas:
    ActivateAccount:
      type: object
      properties:
        email:
          type: string
          format: email
        code:
          type: string
          maxLength: 6
          minLength: 6
      required:
      - code
      - email
    ApprovalStatusEnum:
      enum:
      - pending
      - approved
      - rejected
      - archived
      type: string
      description: |-
        * `pending` - Pending
        * `approved` - Approved
        * `rejected` - Rejected
        * `archived` - Archived
    AudienceEnum:
      enum:
      - doctor
      - pharmacist
      - laboratorian
      - patient
      - admin
      - mixed
      type: string
      description: |-
        * `doctor` - Doctor
        * `pharmacist` - Pharmacist
        * `laboratorian` - Laboratorian
        * `patient` - Patient
        * `admin` - Admin
        * `mixed` - Mixed
    BlankEnum:
      enum:
      - ''
    BloodGroupEnum:
      enum:
      - a_positive
      - a_negative
      - b_positive
      - b_negative
      - ab_positive
      - ab_negative
      - o_positive
      - o_negative
      - unknown
      type: string
      description: |-
        * `a_positive` - A+
        * `a_negative` - A-
        * `b_positive` - B+
        * `b_negative` - B-
        * `ab_positive` - AB+
        * `ab_negative` - AB-
        * `o_positive` - O+
        * `o_negative` - O-
        * `unknown` - Unknown
    BloodGroupValueEnum:
      enum:
      - a_positive
      - a_negative
      - b_positive
      - b_negative
      - ab_positive
      - ab_negative
      - o_positive
      - o_negative
      - unknown
      type: string
      description: |-
        * `a_positive` - A+
        * `a_negative` - A-
        * `b_positive` - B+
        * `b_negative` - B-
        * `ab_positive` - AB+
        * `ab_negative` - AB-
        * `o_positive` - O+
        * `o_negative` - O-
        * `unknown` - Unknown
    CategoryAd7Enum:
      enum:
      - hematology
      - biochemistry
      - immunology
      - microbiology
      - urine_stool
      - hormones
      - blood_bank
      - other
      type: string
      description: |-
        * `hematology` - Hematology
        * `biochemistry` - Biochemistry
        * `immunology` - Immunology
        * `microbiology` - Microbiology
        * `urine_stool` - Urine / Stool
        * `hormones` - Hormones
        * `blood_bank` - Blood Bank
        * `other` - Other
    CompleteLabOrderItemEntry:
      type: object
      properties:
        lab_order_item_id:
          type: string
          format: uuid
        status:
          $ref: '#/components/schemas/StatusDecEnum'
        note:
          type: string
          default: ''
      required:
      - lab_order_item_id
      - status
    CompleteLabOrderItems:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/CompleteLabOrderItemEntry'
      required:
      - items
    ConfirmPasswordReset:
      type: object
      properties:
        email:
          type: string
          format: email
        code:
          type: string
          maxLength: 6
          minLength: 6
        new_password:
          type: string
          writeOnly: true
          minLength: 8
        new_password_confirm:
          type: string
          writeOnly: true
      required:
      - code
      - email
      - new_password
      - new_password_confirm
    ConsultationCreate:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        symptom_ids:
          type: array
          items:
            type: string
            format: uuid
