openapi: 3.0.3
info:
  title: Al-Rafidain Medical Platform API
  version: 0.1.0
  description: Backend API for Al-Rafidain Medical Platform.
paths:
  /api/accounts/activate/:
    post:
      operationId: accounts_activate_create
      description: Activates a user account using the OTP sent to their email.
      summary: Activate account
      tags:
      - Accounts
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ActivateAccount'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ActivateAccount'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ActivateAccount'
        required: true
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          description: No response body
  /api/accounts/login/:
    post:
      operationId: accounts_login_create
      description: Authenticate with email and password. Returns JWT access and refresh
        tokens.
      summary: Login
      tags:
      - Accounts
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Login'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Login'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Login'
        required: true
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          description: No response body
  /api/accounts/me/:
    get:
      operationId: accounts_me_retrieve
      description: Returns the authenticated user's basic information.
      summary: Get current user
      tags:
      - Accounts
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/accounts/password-reset/confirm/:
